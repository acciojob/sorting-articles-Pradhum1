<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alphabetical Article Sorter</title>
  <style>
    html {
      box-sizing: border-box;
      background: url('https://picsum.photos/1500/1000?image=881') center no-repeat;
      background-size: cover;
      min-height: 100vh;
      font-family: sans-serif;
    }

    *, *:before, *:after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
    }

    #band {
      list-style: square inside;
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto;
      padding: 0;
      background: rgba(255, 255, 255, 0.7);
    }

    #band li {
      padding: 20px;
      border-bottom: 1px solid #efefef;
    }
  </style>
</head>
<body>

  <ul id="band"></ul>

  <script>
    const bands = [
      'The Plot in You',
      'The Devil Wears Prada',
      'Pierce the Veil',
      'Norma Jean',
      'The Bled',
      'Say Anything',
      'The Midway State',
      'We Came as Romans',
      'Counterparts',
      'Oh, Sleeper',
      'A Skylit Drive',
      'Anywhere But Here',
      'An Old Dog'
    ];

    function strip(bandName) {
      return bandName.replace(/^(a |an |the )/i, '').trim();
    }

    const sortedBands = bands.sort((a, b) =>
      strip(a).localeCompare(strip(b))
    );

    document.querySelector('#band').innerHTML =
      sortedBands.map(band => `<li>${band}</li>`).join('');
  </script>

</body>
</html>
